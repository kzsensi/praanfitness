    <!-- Lenis Smooth Scroll -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var scriptLoaded = false;

            function activateScript() {
                if (!scriptLoaded) {
                    var scriptElement = document.createElement('script');
                    scriptElement.id = 'lenisSmooth';
                    scriptElement.dataset.idScroll = true;
                    scriptElement.dataset.autoinit = true;
                    scriptElement.dataset.duration = '1';
                    scriptElement.dataset.orientation = 'vertical';
                    scriptElement.dataset.smoothWheel = true;
                    scriptElement.dataset.smoothTouch = false;
                    scriptElement.dataset.touchMultiplier = '1.5';
                    scriptElement.dataset.easing = '(t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t))';
                    scriptElement.dataset.useOverscroll = true;
                    scriptElement.dataset.useControls = true;
                    scriptElement.dataset.useAnchor = true;
                    scriptElement.dataset.useRaf = true;
                    scriptElement.dataset.infinite = false;
                    scriptElement.defer = true;
                    scriptElement.src = 'https://assets-global.website-files.com/645e0e1ff7fdb6dc8c85f3a2/64a5544a813c7253b90f2f50_lenis-offbrand.txt';

                    document.body.appendChild(scriptElement);

                    scriptElement.onload = function () {
                        scriptLoaded = true;
                        document.body.style.overflow = 'visible';
                    };
                }
            }

            var preloaderElement = document.querySelector('[preloader-element]');
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (!entry.isIntersecting && !scriptLoaded) {
                        document.body.style.overflow = 'hidden';
                        activateScript();
                        observer.disconnect();
                    }
                });
            }, { threshold: 0 });

            if (preloaderElement) {
                observer.observe(preloaderElement);
            } else {
                activateScript();
            }

            var stopScrollElement = document.querySelector('[stop-scroll]');
            if (stopScrollElement) {
                stopScrollElement.addEventListener('click', function () {
                    if (scriptLoaded) {
                        var scriptToRemove = document.getElementById('lenisSmooth');
                        if (scriptToRemove) {
                            scriptToRemove.remove();
                            scriptLoaded = false;
                        }
                        document.body.style.overflow = 'hidden';
                    }
                });
            }

            var startScrollElement = document.querySelector('[start-scroll]');
            if (startScrollElement) {
                startScrollElement.addEventListener('click', function () {
                    activateScript();
                });
            }
        });
    </script>
    <!-- End Lenis Smooth Scroll -->


    <!-- Remove Webflow Badge Script -->
    <script>
        (function () {
            // Function to remove the badge
            function removeBadge() {
                var badges = document.querySelectorAll('.w-webflow-badge, a[href*="webflow.com"]');
                badges.forEach(function (badge) {
                    badge.remove();
                });
            }

            // Run immediately
            removeBadge();

            // Watch the DOM for changes and remove it if it gets injected later
            var observer = new MutationObserver(function (mutations) {
                removeBadge();
            });

            observer.observe(document.body, { childList: true, subtree: true });

            // Fallback interval just in case
            setInterval(removeBadge, 1000);
        })();
    </script>
